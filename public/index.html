<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    
    <title>Crypto Lakeside - Official Trading Rewards</title>

    <!-- 1. Google Analytics (GA4) Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Y9M643E6E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Basic configuration
      gtag('config', 'G-2Y9M643E6E', {
        'send_page_view': true,
        'anonymize_ip': true
      });

      /**
       * 2. CUSTOM CONVERSION TRACKER
       * This automatically tracks every time someone clicks your Bybit Affiliate link.
       */
      document.addEventListener('click', function(e) {
        var target = e.target.closest('a');
        if (target && target.href.includes('partner.bybit.com')) {
          gtag('event', 'affiliate_conversion', {
            'event_category': 'Bybit_Sign_Up',
            'event_label': target.href,
            'value': 1.0,
            'currency': 'USD'
          });
          console.log('Tracking Conversion: Bybit Affiliate Link Clicked');
        }
      });
    </script>

    <!-- Meta Tags & Assets -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link href="https://use.fontawesome.com/releases/v5.0.10/css/all.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  </head>

  <body class="loading">
    <noscript>
      <iframe src="https://www.googletagmanager.com/ns.html?id=G-2Y9M643E6E" height="0" width="0" style="display:none;visibility:hidden"></iframe>
      You need to enable JavaScript to run this app.
    </noscript>
    
    <div id="root"></div>

    <!-- Core Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    
    <!-- TradingView/Custom Datafeeds -->
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/polyfills.js"></script>
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/bundle.js"></script>
    
    <script>
      // Initialize AOS Animations
      AOS.init({
        duration: 800,
        once: true
      });

      // Page Loader Logic
      $(document).ready(function() {
        setTimeout(function(){
          $('body').removeClass('loading').addClass('loaded');
        }, 300);
      });
    </script>
  </body>
</html>
