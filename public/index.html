<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    
    <title>Crypto Lakeside - Institutional Trading Terminal</title>

    <!-- 1. Google Analytics (GA4) Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Y9M643E6E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Configuration for your specific ID
      gtag('config', 'G-2Y9M643E6E', {
        'send_page_view': true,
        'anonymize_ip': true
      });

      /**
       * 2. CUSTOM CONVERSION TRACKER (FIXED)
       * This tracks every time a user clicks a Bybit link with your Ref ID.
       */
      document.addEventListener('click', function(e) {
        var target = e.target.closest('a');
        // Fixed: Now checks for your actual referral ID 157106
        if (target && target.href.includes('bybit.com') && target.href.includes('157106')) {
          gtag('event', 'generate_lead', {
            'event_category': 'Affiliate_Click',
            'event_label': 'Bybit_Terminal_Redirect',
            'value': 1.0
          });
          console.log('Conversion Captured: Bybit Referral Clicked');
        }
      });
    </script>

    <!-- Meta Tags & Assets -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link href="https://use.fontawesome.com/releases/v5.0.10/css/all.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    
    <style>
      /* Smooth loading transition */
      body.loading #root { opacity: 0; }
      body.loaded #root { opacity: 1; transition: opacity 0.5s ease-in; }
    </style>
  </head>

  <body class="loading">
    <noscript>
      <div style="padding: 20px; text-align: center; background: #000; color: #fff;">
        Please enable JavaScript to access the Crypto Lakeside Institutional Terminal.
      </div>
    </noscript>
    
    <div id="root"></div>

    <!-- Core Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    
    <!-- TradingView/Custom Datafeeds -->
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/polyfills.js"></script>
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/bundle.js"></script>
    
    <script>
      // Initialize AOS Animations
      AOS.init({
        duration: 800,
        once: true
      });

      // Page Loader Logic
      $(document).ready(function() {
        setTimeout(function(){
          $('body').removeClass('loading').addClass('loaded');
        }, 300);
      });
    </script>
  </body>
</html>
