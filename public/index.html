<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    
    <!-- Primary SEO -->
    <title>Crypto Lakeside | Institutional Trading Terminal</title>
    <meta name="description" content="Access high-alpha institutional trading data. Mirror verified master traders on Bybit with real-time whale flow and market sentiment dashboard." />
    <meta name="keywords" content="Bybit Copy Trading, Crypto Whale Tracker, Bitcoin Fear and Greed Index, Institutional Trading, Mirror Trading, Crypto Lakeside" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cryptolakeside.co.in/" />
    <meta property="og:title" content="Crypto Lakeside | Institutional Trading Terminal" />
    <meta property="og:description" content="Real-time institutional trade execution feed and market sentiment backbone." />
    <meta property="og:image" content="%PUBLIC_URL%/favicon.png" />

    <!-- 1. Google Analytics (GA4) Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2Y9M643E6E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Global Configuration
      gtag('config', 'G-2Y9M643E6E', {
        'send_page_view': true,
        'anonymize_ip': true
      });

      /**
       * 2. AFFILIATE CONVERSION TRACKER
       * Automatically captures leads when users click Bybit referral links.
       */
      document.addEventListener('click', function(e) {
        var target = e.target.closest('a');
        if (target && target.href.includes('bybit.com') && target.href.includes('157106')) {
          gtag('event', 'generate_lead', {
            'event_category': 'Affiliate_Redirect',
            'event_label': 'Bybit_CopyTrade_Hub',
            'value': 1.0
          });
          console.log('Lead Captured: Institutional Mirror Redirect');
        }
      });
    </script>

    <!-- Meta Tags & Assets -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link href="https://use.fontawesome.com/releases/v5.0.10/css/all.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    
    <style>
      /* Page Loader Transition */
      body.loading #root { opacity: 0; }
      body.loaded #root { opacity: 1; transition: opacity 0.6s ease-in; }
      body { background-color: #0f172a; } /* Prevents white flash on load */
    </style>
  </head>

  <body class="loading">
    <noscript>
      <div style="padding: 50px; text-align: center; background: #0f172a; color: #fff; height: 100vh;">
        <h3>Terminal Access Restricted</h3>
        <p>Please enable JavaScript to access the Crypto Lakeside Institutional Data Feed.</p>
      </div>
    </noscript>
    
    <div id="root"></div>

    <!-- Core Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    
    <!-- TradingView/Custom Datafeeds -->
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/polyfills.js"></script>
    <script src="%PUBLIC_URL%/datafeeds/udf/dist/bundle.js"></script>
    
    <script>
      // Initialize Scroll Animations
      AOS.init({
        duration: 1000,
        once: true
      });

      // Page Loader Logic
      $(document).ready(function() {
        setTimeout(function(){
          $('body').removeClass('loading').addClass('loaded');
        }, 400);
      });
    </script>
  </body>
</html>
