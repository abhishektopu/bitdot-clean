name: Hourly Whale Update
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for a clean merge
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Whale Tracker
        run: python whale_tracker.py
        
      - name: Sync and Push Data
        run: |
          git config --global user.name 'WhaleBot'
          git config --global user.email 'bot@cryptolakeside.co.in'
          git add public/whales.json
          # Pull latest changes from you to prevent the "rejected" error
          git pull --rebase origin main
          git commit -m "Automated Data Update" || exit 0
          git push origin main
