name: Hourly Whale Update
on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    # Added permissions block to double-ensure access
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Whale Tracker
        run: python whale_tracker.py
        
      - name: Commit and Push Data
        run: |
          git config --global user.name 'WhaleBot'
          git config --global user.email 'bot@cryptolakeside.co.in'
          git add public/whales.json
          git commit -m "Automated Data Update" || exit 0
          git push
